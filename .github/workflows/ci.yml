# The merge gate for this repo. Every PR to main runs the same two jobs a
# contributor runs locally: "Lint shell scripts" (bin/fm-lint.sh, the one owner of
# the lint definition) and "Behavior tests" (bin/fm-test.sh, the one owner of the
# test-run definition).
# Branch protection on main requires those two job names, so the gate is enforced by
# GitHub rather than by anything a PR author can self-attest to.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned ShellCheck
        run: |
          set -eu
          bin/fm-install-shellcheck.sh "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      # Single owner of the lint definition (file set + config + version). Do not
      # re-spell the shellcheck command here; keep CI and the pre-push gate on it.
      - run: bin/fm-lint.sh

  tests:
    name: Behavior tests
    runs-on: ubuntu-latest
    # The suite should finish in ~2-3 minutes; this generous cap fails loudly on a
    # hung watcher or tmux test instead of riding GitHub's 360-minute default.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install pinned ShellCheck
        run: |
          set -eu
          bin/fm-install-shellcheck.sh "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Require tmux for e2e tests
        run: |
          set -eu
          command -v tmux >/dev/null || {
            echo "::error::tmux is required for real afk injection e2e coverage"
            exit 1
          }
          tmux -V
      - name: Install tasks-axi for backlog-handoff delegation
        run: |
          set -eu
          npm install -g tasks-axi
          tasks-axi --version
      # Single owner of the test-run definition (file set + parallelism + serial-only
      # exceptions + per-test timeout). Do not re-spell the loop here; a crewmate runs
      # the identical `bin/fm-test.sh` locally, so a local pass IS a CI pass. It runs
      # every test even after a failure, then prints each failing test's buffered
      # output under a banner naming its file.
      - run: bin/fm-test.sh

  invariants:
    name: Repo invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Symlinks must stay intact
        run: |
          set -eu
          [ "$(readlink CLAUDE.md)" = "AGENTS.md" ] || { echo "::error::CLAUDE.md must be a symlink to AGENTS.md"; exit 1; }
          [ "$(readlink .claude/skills)" = "../.agents/skills" ] || { echo "::error::.claude/skills must be a symlink to ../.agents/skills"; exit 1; }
      - name: Personal fleet paths must not be tracked
        run: |
          set -eu
          tracked=$(git ls-files -- data state config projects)
          if [ -n "$tracked" ]; then
            echo "::error::Personal fleet paths are tracked in git:"
            printf '%s\n' "$tracked"
            exit 1
          fi
